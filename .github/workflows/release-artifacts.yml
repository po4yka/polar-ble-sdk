name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to publish or dry-run, for example 1.2.3
        required: false
        type: string
      artifact_run_id:
        description: Optional successful Release Artifacts run id to promote instead of the current run artifacts
        required: false
        type: string
      publish_to_github_release:
        description: Create or update a draft GitHub Release after protected approval
        required: true
        default: false
        type: boolean
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ANDROID_PROJECT_DIR: sources/Android/android-communications
  IOS_PROJECT: sources/iOS/ios-communications/iOSCommunications.xcodeproj

jobs:
  release-policy:
    name: Artifact-only release policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release packaging policy
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:verifyReleasePackagingPolicy --no-daemon --warning-mode all

  android-artifacts:
    name: Android and shared Android artifacts
    runs-on: ubuntu-latest
    needs: release-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Verify Android example consumes release AARs
        run: scripts/verify_android_example_aar_consumption.sh

      - name: Verify shared local Maven metadata
        run: scripts/verify_android_shared_maven_metadata.sh

      - name: Stage Android artifacts
        run: |
          mkdir -p /tmp/polar-release-artifacts/android
          cp sources/Android/android-communications/library/build/outputs/aar/library-sdk-release.aar /tmp/polar-release-artifacts/android/polar-ble-sdk.aar
          cp examples/example-android/polar-sensor-data-collector/polarBleSdk/polar-ble-sdk-shared.aar /tmp/polar-release-artifacts/android/polar-ble-sdk-shared.aar
          find sources/Android/android-communications/shared/build -name '*.aar' -print -exec cp {} /tmp/polar-release-artifacts/android/ \;
          cp -R sources/Android/android-communications/shared/build/local-maven-validation /tmp/polar-release-artifacts/android/shared-maven-local

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: /tmp/polar-release-artifacts/android
          if-no-files-found: error
          retention-days: 30

  ios-artifacts:
    name: iOS package validation and shared framework
    runs-on: macos-latest
    needs: release-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Cache Kotlin Native
        uses: ./.github/actions/cache-kotlin-native
        with:
          key-prefix: release-

      - name: Cache SwiftPM
        uses: ./.github/actions/cache-swiftpm
        with:
          key-prefix: release-

      - name: Set up XcodeGen
        uses: ./.github/actions/setup-xcodegen

      - name: Generated Xcode project validation
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:validateGeneratedXcodeProject --no-daemon --warning-mode all

      - name: Validate Swift Package surface
        run: swift package describe

      - name: Swift Package iOS build
        run: sh scripts/ci_xcodebuild_build.sh "${IOS_PROJECT}" PolarBleSdk "generic/platform=iOS" Debug

      - name: Build shared Apple XCFramework
        run: sources/iOS/ios-communications/scripts/package_kmp_xcframework.sh --configuration Release --zip-output /tmp/polar-release-artifacts/ios/PolarBleSdkShared.xcframework.zip

      - name: Validate SwiftPM XCFramework consumption
        run: sources/iOS/ios-communications/scripts/validate_spm_xcframework_consumption.sh --configuration Release --skip-platform-builds

      - name: Stage iOS artifacts
        run: |
          mkdir -p /tmp/polar-release-artifacts/ios
          swift package compute-checksum /tmp/polar-release-artifacts/ios/PolarBleSdkShared.xcframework.zip > /tmp/polar-release-artifacts/ios/PolarBleSdkShared.xcframework.zip.checksum
          cp -R sources/iOS/ios-communications/Generated/PolarBleSdkSharedXCFramework/PolarBleSdkShared.xcframework /tmp/polar-release-artifacts/ios/

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-artifacts
          path: /tmp/polar-release-artifacts/ios
          if-no-files-found: error
          retention-days: 30

  github-release-assets:
    name: GitHub Release asset publication
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - android-artifacts
      - ios-artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
    environment: release-publication
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download current run artifacts
        if: inputs.artifact_run_id == ''
        uses: actions/download-artifact@v4
        with:
          path: /tmp/polar-release-publication/artifacts

      - name: Download supplied run artifacts
        if: inputs.artifact_run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          mkdir -p /tmp/polar-release-publication/artifacts
          gh run download "${ARTIFACT_RUN_ID}" --name android-release-artifacts --dir /tmp/polar-release-publication/artifacts/android-release-artifacts
          gh run download "${ARTIFACT_RUN_ID}" --name ios-release-artifacts --dir /tmp/polar-release-publication/artifacts/ios-release-artifacts

      - name: Import release signing key
        env:
          POLAR_RELEASE_SIGNING_KEY_ASC: ${{ secrets.POLAR_RELEASE_SIGNING_KEY_ASC }}
          POLAR_RELEASE_SIGNING_KEY_PASSPHRASE: ${{ secrets.POLAR_RELEASE_SIGNING_KEY_PASSPHRASE }}
        run: |
          test -n "${POLAR_RELEASE_SIGNING_KEY_ASC}"
          gpg --batch --import <(printf '%s' "${POLAR_RELEASE_SIGNING_KEY_ASC}")
          printf '%s' "${POLAR_RELEASE_SIGNING_KEY_PASSPHRASE}" > /tmp/polar-release-signing-passphrase
          chmod 600 /tmp/polar-release-signing-passphrase

      - name: Prepare release assets
        env:
          POLAR_RELEASE_SIGNING_KEY_ID: ${{ secrets.POLAR_RELEASE_SIGNING_KEY_ID }}
          POLAR_RELEASE_SIGNING_KEY_PASSPHRASE_FILE: /tmp/polar-release-signing-passphrase
        run: |
          scripts/prepare_github_release_assets.sh \
            --artifacts-dir /tmp/polar-release-publication/artifacts \
            --output-dir /tmp/polar-release-publication/assets \
            --release-tag "${{ inputs.release_tag }}" \
            --sign

      - name: Upload dry-run publication manifest
        uses: actions/upload-artifact@v4
        with:
          name: github-release-publication-dry-run
          path: /tmp/polar-release-publication/assets
          if-no-files-found: error
          retention-days: 30

      - name: Create or update draft GitHub Release
        if: inputs.publish_to_github_release == true
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || gh release create "${RELEASE_TAG}" --draft --title "${RELEASE_TAG}" --notes "Draft release assets promoted from Release Artifacts workflow."
          gh release upload "${RELEASE_TAG}" /tmp/polar-release-publication/assets/* --clobber
