name: Nightly Validation

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PROJECT_DIR: sources/Android/android-communications
  IOS_PROJECT: sources/iOS/ios-communications/iOSCommunications.xcodeproj
  IOS_SCHEME: iOSCommunications
  IOS_DESTINATION: platform=iOS Simulator,name=iPhone 17,OS=latest

jobs:
  repo-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Whitespace check
        run: git diff --check HEAD^ HEAD

      - name: Set up actionlint
        uses: ./.github/actions/setup-actionlint

      - name: GitHub Actions workflow lint
        shell: bash
        run: actionlint .github/workflows/*.yml

      - name: Kotlin lint check-mode
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :lintCheck --no-daemon --warning-mode all

      - name: shared policy mirror
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:kmpNonGradleChecks :repo-tools:verifyApiDocsGenerationPolicy --no-daemon --warning-mode all

      - name: Generated API docs stay untracked
        run: test -z "$(git ls-files docs/polar-sdk-android docs/polar-sdk-ios)"

  android-unit:
    name: Android unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Android SDK unit test gate
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :library:testSdkDebugUnitTest --no-daemon --warning-mode all

      - name: Upload Android reports
        if: always()
        uses: ./.github/actions/upload-ci-artifact
        with:
          name: nightly-android-unit-reports
          path: |
            sources/Android/android-communications/library/build/reports/tests/
            sources/Android/android-communications/build/reports/problems/
          if-no-files-found: ignore
          retention-days: 14

  shared-kmp:
    name: Shared shared (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tasks: ':shared:jvmTest :shared:compileAndroidMain :shared:compileAndroidHostTest :shared:compileKotlinMetadata'
          - os: macos-latest
            tasks: ':shared:compileKotlinIosX64 :shared:linkDebugFrameworkIosX64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Cache Kotlin Native
        if: runner.os == 'macOS'
        uses: ./.github/actions/cache-kotlin-native
        with:
          key-prefix: nightly-

      - name: Shared shared gate
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew ${{ matrix.tasks }} --no-daemon --warning-mode all

      - name: Upload shared reports
        if: always()
        uses: ./.github/actions/upload-ci-artifact
        with:
          name: nightly-shared-kmp-${{ matrix.os }}-reports
          path: |
            sources/Android/android-communications/shared/build/reports/
            sources/Android/android-communications/build/reports/problems/
          if-no-files-found: ignore
          retention-days: 14

  api-docs:
    name: API docs generation
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Cache SwiftPM
        uses: ./.github/actions/cache-swiftpm
        with:
          key-prefix: nightly-docs-

      - name: Generate and package API docs
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:packageGeneratedApiDocs --no-daemon --warning-mode all

      - name: Verify generated API docs stay untracked
        run: test -z "$(git ls-files docs/polar-sdk-android docs/polar-sdk-ios)"

      - name: Upload generated API docs archive
        if: always()
        uses: ./.github/actions/upload-ci-artifact
        with:
          name: nightly-generated-api-docs
          path: sources/Android/android-communications/repo-tools/build/api-docs-artifacts/polar-generated-api-docs.tar.gz
          if-no-files-found: error
          retention-days: 14

  ios-xctest:
    name: iOS XCTest
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: ./.github/actions/cache-swiftpm
        with:
          key-prefix: nightly-

      - name: Set up XcodeGen
        uses: ./.github/actions/setup-xcodegen

      - name: iOS Xcode validation probe
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:iosXcodeValidationProbe --no-daemon --warning-mode all

      - name: Generated Xcode project validation
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:validateGeneratedXcodeProject --no-daemon --warning-mode all

      - name: Validate Swift Package surface
        run: swift package describe

      - name: Set up SwiftLint
        uses: ./.github/actions/setup-swiftlint

      - name: SwiftLint check-mode
        run: swiftlint lint --strict --config .swiftlint.yml

      - name: Swift Package iOS build
        run: sh scripts/ci_xcodebuild_build.sh "${IOS_PROJECT}" PolarBleSdk "generic/platform=iOS" Debug

      - name: iOS XCTest gate
        run: sh scripts/ci_xcodebuild_test.sh "${IOS_PROJECT}" "${IOS_SCHEME}" "${IOS_DESTINATION}" /tmp/polar-ios-nightly.xcresult fast

      - name: Upload iOS result bundle
        if: always()
        uses: ./.github/actions/upload-ci-artifact
        with:
          name: nightly-ios-xctest-result
          path: /tmp/polar-ios-nightly.xcresult
          if-no-files-found: ignore
          retention-days: 14
