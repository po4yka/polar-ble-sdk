name: PR Checks

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'documentation/products/**'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'documentation/products/**'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PROJECT_DIR: sources/Android/android-communications
  IOS_PROJECT: sources/iOS/ios-communications/iOSCommunications.xcodeproj
  IOS_SCHEME: iOSCommunications
  IOS_DESTINATION: platform=iOS Simulator,name=iPhone 17,OS=latest

jobs:
  repo-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Whitespace check
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          elif git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            git diff --check "${{ github.event.before }}" "${{ github.sha }}"
          else
            git diff --check HEAD^ "${{ github.sha }}"
          fi

      - name: KMP policy mirror
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:kmpNonGradleChecks --no-daemon --warning-mode all

      - name: Generated API docs stay generator-owned
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- docs/polar-sdk-android docs/polar-sdk-ios)"
          elif git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- docs/polar-sdk-android docs/polar-sdk-ios)"
          else
            changed="$(git diff --name-only HEAD^ "${{ github.sha }}" -- docs/polar-sdk-android docs/polar-sdk-ios)"
          fi
          if [[ -n "$changed" ]]; then
            echo "Generated API documentation changed outside an explicit release-doc regeneration:"
            echo "$changed"
            exit 1
          fi

  android-unit:
    name: Android unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Android SDK unit test gate
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :library:testSdkDebugUnitTest --no-daemon --warning-mode all

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-reports
          path: |
            sources/Android/android-communications/library/build/reports/tests/
            sources/Android/android-communications/build/reports/problems/
          if-no-files-found: ignore
          retention-days: 7

  shared-kmp:
    name: Shared KMP (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tasks: ':shared:jvmTest :shared:compileAndroidMain :shared:compileAndroidHostTest :shared:compileKotlinMetadata'
          - os: macos-latest
            tasks: ':shared:compileKotlinIosX64 :shared:linkDebugFrameworkIosX64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Kotlin Native
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('sources/Android/android-communications/gradle/wrapper/gradle-wrapper.properties', 'sources/Android/android-communications/build.gradle', 'sources/Android/android-communications/shared/build.gradle') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Shared KMP gate
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew ${{ matrix.tasks }} --no-daemon --warning-mode all

      - name: Upload shared reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-kmp-${{ matrix.os }}-reports
          path: |
            sources/Android/android-communications/shared/build/reports/
            sources/Android/android-communications/build/reports/problems/
          if-no-files-found: ignore
          retention-days: 7

  ios-xctest:
    name: iOS XCTest
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            .swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: iOS Xcode validation probe
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew :repo-tools:iosXcodeValidationProbe --no-daemon --warning-mode all

      - name: Validate Swift Package surface
        run: swift package describe

      - name: Swift Package iOS build
        run: xcodebuild -scheme PolarBleSdk -destination "generic/platform=iOS" build

      - name: iOS XCTest gate
        run: sh scripts/ci_xcodebuild_test.sh "${IOS_PROJECT}" "${IOS_SCHEME}" "${IOS_DESTINATION}" /tmp/polar-ios-xctest-ci.xcresult

      - name: Upload iOS result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xctest-result
          path: /tmp/polar-ios-xctest-ci.xcresult
          if-no-files-found: ignore
          retention-days: 7
