name: Set up SwiftLint
description: Install a pinned SwiftLint release after SHA-256 verification.
runs:
  using: composite
  steps:
    - name: Install SwiftLint
      shell: bash
      run: |
        set -euo pipefail

        version="0.63.3"
        archive_name="portable_swiftlint.zip"
        expected_sha256="fb045e85e7cb3374f42a4840b6b85a0106302afa69035c0c6f29af4a44c810b6"
        url="https://github.com/realm/SwiftLint/releases/download/${version}/${archive_name}"
        tool_dir="${RUNNER_TEMP}/swiftlint-${version}"
        archive_path="${RUNNER_TEMP}/swiftlint-${version}.zip"

        case "$(uname -s)-$(uname -m)" in
          Darwin-*)
            ;;
          *)
            echo "Unsupported SwiftLint runner: $(uname -s)-$(uname -m)" >&2
            exit 2
            ;;
        esac

        rm -rf "${tool_dir}"
        mkdir -p "${tool_dir}"
        curl -fsSL "${url}" -o "${archive_path}"
        printf '%s  %s\n' "${expected_sha256}" "${archive_path}" | shasum -a 256 -c -
        unzip -q "${archive_path}" -d "${tool_dir}"
        chmod +x "${tool_dir}/swiftlint"
        "${tool_dir}/swiftlint" version
        echo "${tool_dir}" >> "${GITHUB_PATH}"
