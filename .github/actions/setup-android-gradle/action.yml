name: Set up Android Gradle
description: Validate the Gradle wrapper, install Java 21, optionally install Android SDK tooling, and enable Gradle caching.
inputs:
  android:
    description: Install Android SDK tooling.
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Set up Android SDK
      if: inputs.android == 'true'
      uses: android-actions/setup-android@v3

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
