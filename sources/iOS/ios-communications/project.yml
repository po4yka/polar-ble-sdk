# XcodeGen source of truth for the local Xcode compatibility harness.
name: iOSCommunications
options:
  bundleIdPrefix: com.polar
  deploymentTarget:
    iOS: "14.0"
    watchOS: "5.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.38.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.20
settings:
  base:
    SWIFT_VERSION: "5.0"
    CLANG_ENABLE_MODULES: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
targetTemplates:
  KmpBackedIosFramework:
    platform: iOS
    type: framework
    deploymentTarget: "14.0"
    dependencies:
      - package: SwiftProtobuf
      - package: ZIPFoundation
    preBuildScripts:
      - name: Build PolarBleSdkShared KMP Framework
        script: '"${SRCROOT}/scripts/build_kmp_ios_framework.sh"'
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/scripts/build_kmp_ios_framework.sh
          - $(SRCROOT)/../../Android/android-communications/shared/build.gradle.kts
          - $(SRCROOT)/../../Android/android-communications/shared/src
    settings:
      base:
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        CODE_SIGN_IDENTITY: ""
        DEFINES_MODULE: YES
        DYLIB_COMPATIBILITY_VERSION: 1
        DYLIB_CURRENT_VERSION: 1
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        ENABLE_BITCODE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Generated/PolarBleSdkShared/$(PLATFORM_NAME)
        HEADER_SEARCH_PATHS: $(inherited)
        INSTALL_PATH: $(LOCAL_LIBRARY_DIR)/Frameworks
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - PolarBleSdkShared
        PRODUCT_NAME: $(TARGET_NAME)
        SDKROOT: iphoneos
        SKIP_INSTALL: YES
        SUPPORTED_PLATFORMS: iphonesimulator iphoneos
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1,2
      configs:
        Debug:
          BUILD_LIBRARY_FOR_DISTRIBUTION: NO
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          BUILD_LIBRARY_FOR_DISTRIBUTION: YES
targets:
  iOSCommunications:
    templates:
      - KmpBackedIosFramework
    sources:
      - path: Sources/iOSCommunications
        excludes:
          - Info.plist
    settings:
      base:
        CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES: YES
        INFOPLIST_FILE: $(SRCROOT)/Sources/iOSCommunications/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: 14.1.9
        PRODUCT_BUNDLE_IDENTIFIER: com.polar.iOSCommunications
        SWIFT_OBJC_INTERFACE_HEADER_NAME: $(SWIFT_MODULE_NAME)-Swift.h
        SWIFT_SWIFT3_OBJC_INFERENCE: Off
  PolarBleSdk:
    templates:
      - KmpBackedIosFramework
    deploymentTarget: "15.0"
    sources:
      - path: Sources
        excludes:
          - iOSCommunications/Info.plist
          - PolarBleSdk/Info.plist
          - iOSCommunications/Resources
    resources:
      - path: Sources/iOSCommunications/Resources
    settings:
      base:
        CLANG_CXX_LANGUAGE_STANDARD: gnu++14
        CLANG_ENABLE_OBJC_ARC: NO
        INFOPLIST_FILE: $(SRCROOT)/Sources/PolarBleSdk/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        MACH_O_TYPE: mh_dylib
        MARKETING_VERSION: 3.3.0
        OTHER_CFLAGS[arch=*]: -fembed-bitcode
        OTHER_SWIFT_FLAGS: $(inherited) -D POLAR_KMP_SHARED_REQUIRED
        PRODUCT_BUNDLE_IDENTIFIER: com.polar.PolarBleSdk
        PRODUCT_NAME: $(TARGET_NAME:c99extidentifier)
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/iOSCommunications/sdk/impl/protobuf
        VALIDATE_WORKSPACE: YES
  PolarBleSdkWatchOs:
    platform: watchOS
    type: framework
    deploymentTarget: "5.0"
    sources:
      - path: Sources/PolarBleSdk
        excludes:
          - Info.plist
    dependencies:
      - package: SwiftProtobuf
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: NO
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        CLANG_CXX_LANGUAGE_STANDARD: gnu++14
        CLANG_ENABLE_OBJC_ARC: NO
        CODE_SIGN_IDENTITY: ""
        DEFINES_MODULE: YES
        DYLIB_COMPATIBILITY_VERSION: 1
        DYLIB_CURRENT_VERSION: 1
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        INFOPLIST_FILE: $(SRCROOT)/Sources/PolarBleSdk/Info.plist
        INSTALL_PATH: $(LOCAL_LIBRARY_DIR)/Frameworks
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        MARKETING_VERSION: 3.3.0
        OTHER_SWIFT_FLAGS: $(inherited)
        PRODUCT_BUNDLE_IDENTIFIER: com.polar.PolarBleSdkWatchOs
        PRODUCT_NAME: $(TARGET_NAME:c99extidentifier)
        SDKROOT: watchos
        SKIP_INSTALL: YES
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/iOSCommunications/sdk/impl/protobuf
        TARGETED_DEVICE_FAMILY: 4
        WATCHOS_DEPLOYMENT_TARGET: "5.0"
      configs:
        Debug:
          BUILD_LIBRARY_FOR_DISTRIBUTION: NO
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          BUILD_LIBRARY_FOR_DISTRIBUTION: YES
  iOSCommunicationsTests:
    platform: iOS
    type: bundle.unit-test
    deploymentTarget: "14.0"
    sources:
      - path: Tests/iOSCommunicationsTests
    resources:
      - path: ../../../testdata
    dependencies:
      - target: iOSCommunications
    settings:
      base:
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: $(inherited)
        DEVELOPMENT_TEAM: 48T8QNDCP9
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Generated/PolarBleSdkShared/$(PLATFORM_NAME)
        INFOPLIST_FILE: Tests/iOSCommunicationsTests/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: com.polar.iOSCommunicationsTests
        PRODUCT_NAME: $(TARGET_NAME)
  PolarBleSdkTests:
    platform: iOS
    type: bundle.unit-test
    deploymentTarget: "16.1"
    sources:
      - path: Tests/PolarBleSdkTests
    resources:
      - path: Tests/PolarBleSdkTests/PolarBleSdkTests.xctestplan
      - path: ../../../testdata
    dependencies:
      - target: PolarBleSdk
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: 48T8QNDCP9
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Generated/PolarBleSdkShared/$(PLATFORM_NAME)
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        MARKETING_VERSION: 1.0
        PRODUCT_BUNDLE_IDENTIFIER: com.polar.PolarBleSdkTests
        PRODUCT_NAME: $(TARGET_NAME)
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: NO
        TARGETED_DEVICE_FAMILY: 1,2
      configs:
        Debug:
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          MTL_ENABLE_DEBUG_INFO: NO
schemes:
  iOSCommunications:
    build:
      targets:
        iOSCommunications: all
    test:
      config: Debug
      targets:
        - iOSCommunicationsTests
        - PolarBleSdkTests
      gatherCoverageData: false
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  PolarBleSdk:
    build:
      targets:
        PolarBleSdk: all
    test:
      config: Debug
      targets:
        - PolarBleSdkTests
        - iOSCommunicationsTests
      gatherCoverageData: false
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  PolarBleSdkWatchOs:
    build:
      targets:
        PolarBleSdkWatchOs: all
    test:
      config: Debug
      targets: []
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
