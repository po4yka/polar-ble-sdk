def requireEnv = { name ->
    def v = System.getenv(name)
    if (!v) throw new GradleException("Missing environment variable: " + name)
    return v
}

if (project.hasProperty("artifactoryUser") && project.hasProperty("artifactoryPassword")) {
    apply plugin: 'com.jfrog.artifactory'
    apply plugin: 'maven-publish'
}

import java.util.regex.Pattern

def getVersion = { ->
    try {
        def process = new ProcessBuilder('git', 'describe', '--tags')
            .directory(rootProject.projectDir)
            .redirectErrorStream(true)
            .start()
        def describedVersion = process.inputStream.text.trim()
        def exitValue = process.waitFor()
        if (exitValue != 0) {
            logger.warn("WARNING: 'git describe --tags' failed (exit ${exitValue}). Version information from git is not available. Using fallback version.")
            return "unknown"
        }
        def pattern = Pattern.compile("^(\\d*)(\\.)(\\d*)(\\.)(\\d*)(-.*)")
        def matcher = pattern.matcher(describedVersion)
        if (matcher.matches()) {
            String MAJOR = matcher.group(1)
            String MINOR = matcher.group(3)
            String PATCH = matcher.group(5)
            def VERSION = MAJOR + "." + MINOR + "." + PATCH
            println VERSION
            return VERSION
        } else {
            return describedVersion
        }
    } catch (Exception e) {
        logger.warn("WARNING: git command is not available or failed: ${e.message}. Version information from git is not possible to detect. Using fallback version.")
        return "unknown"
    }
}

// Version of the Polar BLE SDK declared as the JitPack dependency (see dependencies block below).
// Set this to select SDK version to use with PSDC app
def POLAR_SDK_VERSION = '8.0.0' // e.g. '6.15.0'

// Returns the SDK version string to embed in BuildConfig.SDK_VERSION:
//   - JitPack mode  → the declared POLAR_SDK_VERSION constant (always reliable)
//   - Local SDK mode → git describe --tags (falls back to "unknown" with a build warning)
def getSdkVersion = { ->
    if (!localSdk.toBoolean()) {
        return POLAR_SDK_VERSION
    }
    // Local AAR: derive version from git tags (same repo as the SDK source)
    try {
        def process = new ProcessBuilder('git', 'describe', '--tags')
            .directory(rootProject.projectDir)
            .redirectErrorStream(true)
            .start()
        def describedVersion = process.inputStream.text.trim()
        def exitValue = process.waitFor()
        if (exitValue != 0) {
            logger.warn("WARNING: 'git describe --tags' failed (exit ${exitValue}). SDK version from git is not available. Using fallback version.")
            return "unknown"
        }
        // Match both plain tags ("6.15.0") and post-commit describe output ("6.15.0-43-gabcdef")
        def pattern = Pattern.compile("^(\\d+)\\.(\\d+)\\.(\\d+)(-.*)?\$")
        def matcher = pattern.matcher(describedVersion)
        if (matcher.matches()) {
            return "${matcher.group(1)}.${matcher.group(2)}.${matcher.group(3)}"
        } else {
            return describedVersion
        }
    } catch (Exception e) {
        logger.warn("WARNING: git command is not available or failed: ${e.message}. SDK version from git is not possible to detect. Using fallback version.")
        return "unknown"
    }
}

android {
    namespace = 'com.polar.polarsensordatacollector'
    compileSdk = 37
    buildTypes.all { buildType ->
        def version = getSdkVersion()
        buildConfigField 'String', 'SDK_VERSION', "\"$version\""
    }

    defaultConfig {
        applicationId "com.polar.polarsensordatacollector"
        minSdk = 26
        targetSdk = 37
    	versionCode 76700
        // version code from semantic version in format [2 digits of major][2 digits of minor][2 digits of batch]
    	versionName "7.67.0"
        multiDexEnabled = true
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'

        vectorDrawables {
            useSupportLibrary = true
        }

        if (localSdk.toBoolean()) {
            missingDimensionStrategy 'library', 'sdk'
        }
    }

    buildFeatures {
        buildConfig = true
    }

    signingConfigs {
        if (System.getenv("PSDC_ANDROID_KEYSTORE_PATH")) {
            release {
                storeFile file(System.getenv("PSDC_ANDROID_KEYSTORE_PATH"))
                storePassword System.getenv("PSDC_ANDROID_KEYSTORE_PASSWORD")
                keyAlias (System.getenv("PSDC_ANDROID_KEY_ALIAS") ?: "release")
                keyPassword System.getenv("PSDC_ANDROID_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            def releaseSigningConfig = signingConfigs.findByName('release')
            if (releaseSigningConfig) {
                signingConfig releaseSigningConfig
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            firebaseAppDistribution {
                artifactType = "APK"
                serviceCredentialsFile = System.getenv("GOOGLE_APPLICATION_CREDENTIALS")
                groups = "psdc-internal-testing"
                // releaseNotesFile = "release-notes.txt"
            }
        }
    }

    buildFeatures {
        compose = true
    }


    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }
}

if (project.hasProperty("artifactoryUser") && project.hasProperty("artifactoryPassword")) {
    publishing {
        publications {
            apk(MavenPublication) {
                groupId 'com.polar'
                version = getVersion()
                artifactId 'polar-sensor-data-collector'
                artifact("$buildDir/outputs/apk/release/app-release.apk")
            }
        }
    }

    artifactory {
        def artifactory_url = project.getProperty('artifactoryUrl')
        def artifactory_user = project.getProperty('artifactoryUser')
        def artifactory_password = project.getProperty('artifactoryPassword')
        println "USER: " + "${artifactory_user}"
        println "PASSWD: " + "${artifactory_password}"
        println "URL: " + "${artifactory_url}"
        contextUrl = artifactory_url
        publish {
            repository {
                // The Artifactory repository key to publish to
                repoKey = 'libs-release-local'
                username = "${artifactory_user}" // The publisher user name
                password = "${artifactory_password}" // The publisher password
            }
            defaults {
                // Tell the Artifactory Plugin which artifacts should be published to Artifactory.
                publications('apk')
                // Properties to be attached to the published artifacts.
                properties = ['qa.level': 'basic', 'dev.team': 'core']
            }
        }
    }
}

