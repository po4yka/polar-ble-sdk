apply plugin: 'com.google.gms.google-services'

gradle.taskGraph.whenReady { taskGraph ->
    def releaseTaskRequested = taskGraph.allTasks.any { task ->
        task.name ==~ /.*[Rr]elease.*/
    }
    if (releaseTaskRequested && !android.signingConfigs.findByName('release')) {
        throw new GradleException("Release signing not configured. Set PSDC_ANDROID_KEYSTORE_PATH, PSDC_ANDROID_KEYSTORE_PASSWORD, and PSDC_ANDROID_KEY_PASSWORD.")
    }
}
